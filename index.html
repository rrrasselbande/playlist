<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interaktive & automatische CD</title>
<style>
/* Lokale Schrift einbinden */
@font-face {
    font-family: "Rrr Regular Regular";
    src: url("Rrr-Regular.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
}

/* Body zentriert, Helvetica Bold */
body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: white;
    font-family: "Helvetica", sans-serif;
    font-weight: bold; /* Helvetica fett */
}

/* CD */
.cd {
    width: 300px;
    height: 300px;
    background-image: url("CD.png");
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    cursor: grab;
    touch-action: none;
    user-select: none;
    transition: transform 0.1s linear;
}

/* Footer */
.footer {
    position: absolute;
    bottom: 20px;
    font-size: 1.5rem;
}

.footer a {
    text-decoration: none;
    color: black;
}

.footer a:hover {
    color: #e1306c; /* Instagram-Farbe */
}

/* Nur Rr in Footer */
.footer a .rr {
    font-family: "Rrr Regular Regular", sans-serif;
    font-weight: normal;
}

/* Responsive */
@media (max-width: 600px) {
    .cd {
        width: 200px;
        height: 200px;
    }
    .footer {
        font-size: 1.2rem;
    }
}
</style>
</head>
<body>

<!-- CD -->
<div class="cd" id="cd"></div>

<!-- Footer mit Instagram-Link -->
<div class="footer">
    <a href="https://www.instagram.com/rrasselbande/" target="_blank">
        <span>@</span><span class="rr">Rr</span><span>ASSELBANDE</span>
    </a>
</div>

<script>
const cd = document.getElementById('cd');
let isDragging = false;
let startAngle = 0;
let currentRotation = 0;

// Minimale automatische Rotation
let autoRotationSpeed = 0.3; // sehr langsam
function rotateCD() {
    if (!isDragging) {
        currentRotation += autoRotationSpeed;
        cd.style.transform = `rotate(${currentRotation}deg)`;
    }
    requestAnimationFrame(rotateCD);
}
rotateCD();

// Maus & Touch Events
function getAngle(clientX, clientY) {
    const rect = cd.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    return Math.atan2(clientY - cy, clientX - cx) * 180 / Math.PI;
}

// Maus Events
cd.addEventListener('mousedown', e => {
    isDragging = true;
    startAngle = getAngle(e.clientX, e.clientY) - currentRotation;
    cd.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const angle = getAngle(e.clientX, e.clientY);
    currentRotation = angle - startAngle;
    cd.style.transform = `rotate(${currentRotation}deg)`;
});

document.addEventListener('mouseup', e => {
    isDragging = false;
    cd.style.cursor = 'grab';
});

// Touch Events
cd.addEventListener('touchstart', e => {
    isDragging = true;
    const touch = e.touches[0];
    startAngle = getAngle(touch.clientX, touch.clientY) - currentRotation;
});

cd.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const touch = e.touches[0];
    const angle = getAngle(touch.clientX, touch.clientY);
    currentRotation = angle - startAngle;
    cd.style.transform = `rotate(${currentRotation}deg)`;
});

cd.addEventListener('touchend', e => {
    isDragging = false;
});
</script>

</body>
</html>
